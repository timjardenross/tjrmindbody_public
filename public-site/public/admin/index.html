<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Content Manager — TJR Mind & Body</title>
    <meta name="robots" content="noindex, nofollow" />
  </head>
  <body>
    <!-- Sveltia CMS reads /admin/config.yml from this same directory by default. -->
    <!--
      Pinned to a specific version with a Subresource Integrity hash so a
      compromised/tampered CDN or npm package can't silently swap in code
      that intercepts the GitHub token this page's opener receives. To bump
      the version: `npm pack @sveltia/cms@<version>`, extract the tarball,
      then `openssl dgst -sha384 -binary dist/sveltia-cms.mjs | openssl base64 -A`
      and update both the version in the URL and the integrity hash below.
    -->
    <script
      src="https://unpkg.com/@sveltia/cms@0.170.4/dist/sveltia-cms.mjs"
      type="module"
      integrity="sha384-C4FcC9xm/3x+GooVMBNC7MBpqO08TlwtdPxzJxrFEgyu8B3xJJkaFYYiM34vJn4d"
      crossorigin="anonymous"
    ></script>
    <!--
      This version of Sveltia CMS doesn't auto-bootstrap on script load — it
      exports an `init()` that must be called explicitly. This second,
      inline module re-imports the exact same URL as the script tag above,
      so it resolves from the browser's already-fetched, already
      SRI-verified module record rather than issuing a second network
      fetch — the integrity check above still applies; this doesn't bypass
      it.
    -->
    <script type="module">
      import CMS from 'https://unpkg.com/@sveltia/cms@0.170.4/dist/sveltia-cms.mjs';
      CMS.init();
    </script>
  </body>
</html>
