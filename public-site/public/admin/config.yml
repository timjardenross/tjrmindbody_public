# ============================================================
# Sveltia CMS configuration — TJR Mind & Body public content platform
#
# Adding a new content collection later is a matter of adding one more
# block below (and a matching entry in src/lib/collections.ts) — no
# redesign of the CMS, routing or rendering is required.
#
# `backend.base_url` must match the site's real deployed origin (the
# GitHub OAuth App's "Authorization callback URL" is
# "<base_url>/api/auth"). Update it here when the production domain is
# finalised — see public-site/docs/CMS-SETUP.md.
# ============================================================

backend:
  name: github
  repo: timjardenross/tjrmindbody_public
  branch: main
  base_url: https://www.tjrmindbody.com
  auth_endpoint: api/auth

# Uploaded media is committed into the repo alongside content, so it
# ships with the same Git history / disaster-recovery guarantees.
media_folder: "public-site/public/uploads"
public_folder: "/uploads"

collections:
  # ── Library ───────────────────────────────────────────────
  - name: "library"
    label: "Library"
    label_singular: "Library Item"
    folder: "public-site/content/library"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}} — {{contentType}} — {{journeyStage}}"
    sortable_fields: ["date", "title", "contentType", "journeyStage", "revsPillar"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Updated", name: "updated", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: true, hint: "Draft items are hidden from the public site until unchecked." }
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "1–2 sentence plain-English summary shown on Library cards, search results and social previews." }
      - label: "Content type"
        name: "contentType"
        widget: "select"
        options: ["Article", "Guide", "Resource", "Insight", "Visual Explainer", "Worksheet", "Poster", "Carousel", "Video Script", "Presentation Script"]
      - label: "REVS journey stage"
        name: "journeyStage"
        widget: "select"
        required: false
        options: ["Discover Your Capacity", "Profile Your Capacity", "Build Your Capacity", "Track Your Capacity", "Grow Your Capacity", "Coach-Supported Growth", "Library of Resources"]
      - label: "REVS pillar"
        name: "revsPillar"
        widget: "select"
        required: false
        options: ["Resilience", "Emotion", "Vitality", "Stability"]
      - label: "Capacity systems"
        name: "capacitySystems"
        widget: "select"
        multiple: true
        required: false
        hint: "Use this instead of separate collections. One item can cover several systems."
        options: ["Physical Health", "Mental Health", "Executive Functioning", "Sleep", "Chronic Pain", "Emotional Wellbeing", "Relationships", "Work", "Environment", "Recovery", "Purpose", "Protective Factors"]
      - label: "Poster class"
        name: "revsPosterClass"
        widget: "select"
        required: false
        options: ["Curriculum Poster", "Public-Interest Poster", "Deep Dive"]
      - label: "Icon family"
        name: "iconFamily"
        widget: "select"
        required: false
        options: ["Leadership", "People", "Communication", "Buildings", "Technology", "Data", "Risk", "Recovery", "Learning", "Nature/Environment", "Health", "Supply Chain", "Cyber", "Governance"]
      - { label: "Season", name: "season", widget: "string", required: false, hint: "For REVS Explained Visually curriculum items, e.g. Season 1." }
      - { label: "Week", name: "week", widget: "number", value_type: "int", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false, hint: "Flexible keywords for search. Prefer capacitySystems for core taxonomy." }
      - { label: "Featured image", name: "featuredImage", widget: "image", required: false }
      - { label: "Featured image alt text", name: "featuredImageAlt", widget: "string", required: false }
      - { label: "Author", name: "author", widget: "string", required: false, default: "TJR" }
      - label: "Attachment (downloadable file)"
        name: "attachment"
        widget: "file"
        required: false
        hint: "PDF, worksheet or other downloadable file. Adds a Download button to the resource page."
      - { label: "Attachment label", name: "attachmentLabel", widget: "string", required: false, hint: "Button text, e.g. \"Download the worksheet (PDF)\". Defaults to a generic label if left blank." }
      - label: "SEO"
        name: "seo"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "SEO title override", name: "title", widget: "string", required: false }
          - { label: "Meta description", name: "description", widget: "text", required: false }
          - { label: "Canonical URL", name: "canonicalUrl", widget: "string", required: false }
          - { label: "Social share image override", name: "ogImage", widget: "image", required: false }
          - { label: "Hide from search engines", name: "noindex", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }

  # ── Discover Capacity Codes ───────────────────────────────
  - name: "discover-capacity-codes"
    label: "Discover Capacity Codes"
    label_singular: "Access Code"
    folder: "public-site/content/discover-capacity-codes"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{label}} — {{code}}"
    sortable_fields: ["createdAt", "label"]
    fields:
      - { label: "Label", name: "label", widget: "string" }
      - { label: "Code", name: "code", widget: "string" }
      - { label: "Active", name: "active", widget: "boolean", default: true }
      - { label: "Created at", name: "createdAt", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss.SSS[Z]", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Last used at", name: "lastUsedAt", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss.SSS[Z]", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Response count", name: "responseCount", widget: "number", value_type: "int", default: 0 }
      - { label: "Body", name: "body", widget: "markdown", required: false }

  # ── Instagram Highlights ─────────────────────────────────
  - name: "instagram-highlights"
    label: "Instagram Highlights"
    label_singular: "Instagram Highlight"
    folder: "public-site/content/instagram-highlights"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}} — {{postUrl}}"
    sortable_fields: ["order", "date", "title"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Instagram post URL", name: "postUrl", widget: "string", hint: "Paste the public Instagram post or reel URL." }
      - { label: "Caption", name: "caption", widget: "text", required: false, hint: "Optional short site-friendly caption. Keep it concise." }
      - { label: "Preview image", name: "image", widget: "image", required: false, hint: "Optional. Upload a square image/screenshot so the homepage does not rely on Instagram scripts." }
      - { label: "Preview image alt text", name: "imageAlt", widget: "string", required: false }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Display order", name: "order", widget: "number", value_type: "int", required: false, hint: "Lower numbers show first. Leave blank to sort by date." }
      - { label: "Active", name: "active", widget: "boolean", default: true, hint: "Turn off to hide this highlight without deleting it." }

  # ── Pages ─────────────────────────────────────────────────
  # Standalone pages (About, Coaching, Let's Chat, ...). Rendered at the
  # site root, e.g. content/pages/about.md -> /about.
  - name: "pages"
    label: "Pages"
    label_singular: "Page"
    folder: "public-site/content/pages"
    create: true
    delete: false
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Updated", name: "updated", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - label: "SEO"
        name: "seo"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "SEO title override", name: "title", widget: "string", required: false }
          - { label: "Meta description", name: "description", widget: "text", required: false }
          - { label: "Canonical URL", name: "canonicalUrl", widget: "string", required: false }
          - { label: "Social share image override", name: "ogImage", widget: "image", required: false }
          - { label: "Hide from search engines", name: "noindex", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }
