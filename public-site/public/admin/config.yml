# ============================================================
# Sveltia CMS configuration — TJR Mind & Body public content platform
#
# Adding a new content collection later is a matter of adding one more
# block below (and a matching entry in src/lib/collections.ts) — no
# redesign of the CMS, routing or rendering is required.
#
# `backend.base_url` must match the site's real deployed origin (the
# GitHub OAuth App's "Authorization callback URL" is
# "<base_url>/api/auth"). Update it here when the production domain is
# finalised — see public-site/docs/CMS-SETUP.md.
# ============================================================

backend:
  name: github
  repo: timjardenross/USSTJROS
  branch: main
  base_url: https://www.tjrmindandbody.com
  auth_endpoint: api/auth

# Uploaded media is committed into the repo alongside content, so it
# ships with the same Git history / disaster-recovery guarantees.
media_folder: "public-site/public/uploads"
public_folder: "/uploads"

collections:
  # ── Blog ──────────────────────────────────────────────────
  - name: "blog"
    label: "Blog"
    label_singular: "Post"
    folder: "public-site/content/blog"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}} — {{date}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Updated", name: "updated", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: true, hint: "Draft posts are hidden from the public site until unchecked." }
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "1–2 sentence summary shown on listing cards, search results and social previews." }
      - label: "Category"
        name: "category"
        widget: "select"
        required: false
        options: ["Chronic Pain", "Mindfulness", "Coaching", "Resilience", "General"]
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Featured image", name: "featuredImage", widget: "image", required: false }
      - { label: "Featured image alt text", name: "featuredImageAlt", widget: "string", required: false }
      - { label: "Author", name: "author", widget: "string", required: false, default: "TJR" }
      - label: "SEO"
        name: "seo"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "SEO title override", name: "title", widget: "string", required: false }
          - { label: "Meta description", name: "description", widget: "text", required: false }
          - { label: "Canonical URL", name: "canonicalUrl", widget: "string", required: false }
          - { label: "Social share image override", name: "ogImage", widget: "image", required: false }
          - { label: "Hide from search engines", name: "noindex", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }

  # ── Guides ────────────────────────────────────────────────
  - name: "guides"
    label: "Guides"
    label_singular: "Guide"
    folder: "public-site/content/guides"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}} — {{date}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Updated", name: "updated", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: true }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - label: "Category"
        name: "category"
        widget: "select"
        required: false
        options: ["Chronic Pain", "Mindfulness", "Coaching", "Resilience", "General"]
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Featured image", name: "featuredImage", widget: "image", required: false }
      - { label: "Featured image alt text", name: "featuredImageAlt", widget: "string", required: false }
      - { label: "Author", name: "author", widget: "string", required: false, default: "TJR" }
      - label: "SEO"
        name: "seo"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "SEO title override", name: "title", widget: "string", required: false }
          - { label: "Meta description", name: "description", widget: "text", required: false }
          - { label: "Canonical URL", name: "canonicalUrl", widget: "string", required: false }
          - { label: "Social share image override", name: "ogImage", widget: "image", required: false }
          - { label: "Hide from search engines", name: "noindex", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }

  # ── REVS Articles ─────────────────────────────────────────
  - name: "revs-articles"
    label: "REVS Articles"
    label_singular: "REVS Article"
    folder: "public-site/content/revs-articles"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}} — {{date}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Updated", name: "updated", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: true }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - label: "REVS Pillar"
        name: "revsPillar"
        widget: "select"
        required: false
        hint: "Which of the four REVS pillars this article is primarily about."
        options: ["Resilience", "Emotion", "Vitality", "Stability"]
      - label: "Category"
        name: "category"
        widget: "select"
        required: false
        options: ["Chronic Pain", "Mindfulness", "Coaching", "Resilience", "General"]
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Featured image", name: "featuredImage", widget: "image", required: false }
      - { label: "Featured image alt text", name: "featuredImageAlt", widget: "string", required: false }
      - { label: "Author", name: "author", widget: "string", required: false, default: "TJR" }
      - label: "SEO"
        name: "seo"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "SEO title override", name: "title", widget: "string", required: false }
          - { label: "Meta description", name: "description", widget: "text", required: false }
          - { label: "Canonical URL", name: "canonicalUrl", widget: "string", required: false }
          - { label: "Social share image override", name: "ogImage", widget: "image", required: false }
          - { label: "Hide from search engines", name: "noindex", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }

  # ── Operational Resilience Insights ──────────────────────
  - name: "operational-resilience-insights"
    label: "Operational Resilience Insights"
    label_singular: "Insight"
    folder: "public-site/content/operational-resilience-insights"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}} — {{date}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Updated", name: "updated", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: true }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - label: "Category"
        name: "category"
        widget: "select"
        required: false
        options: ["Chronic Pain", "Mindfulness", "Coaching", "Resilience", "General"]
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Featured image", name: "featuredImage", widget: "image", required: false }
      - { label: "Featured image alt text", name: "featuredImageAlt", widget: "string", required: false }
      - { label: "Author", name: "author", widget: "string", required: false, default: "TJR" }
      - label: "SEO"
        name: "seo"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "SEO title override", name: "title", widget: "string", required: false }
          - { label: "Meta description", name: "description", widget: "text", required: false }
          - { label: "Canonical URL", name: "canonicalUrl", widget: "string", required: false }
          - { label: "Social share image override", name: "ogImage", widget: "image", required: false }
          - { label: "Hide from search engines", name: "noindex", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }

  # ── Resources ─────────────────────────────────────────────
  - name: "resources"
    label: "Resources"
    label_singular: "Resource"
    folder: "public-site/content/resources"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}} — {{date}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Updated", name: "updated", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: true }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - label: "Category"
        name: "category"
        widget: "select"
        required: false
        options: ["Chronic Pain", "Mindfulness", "Coaching", "Resilience", "General"]
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Featured image", name: "featuredImage", widget: "image", required: false }
      - { label: "Featured image alt text", name: "featuredImageAlt", widget: "string", required: false }
      - { label: "Author", name: "author", widget: "string", required: false, default: "TJR" }
      - label: "Attachment (downloadable file)"
        name: "attachment"
        widget: "file"
        required: false
        hint: "PDF, worksheet or other downloadable file. Adds a Download button to the resource page."
      - { label: "Attachment label", name: "attachmentLabel", widget: "string", required: false, hint: "Button text, e.g. \"Download the worksheet (PDF)\". Defaults to a generic label if left blank." }
      - label: "SEO"
        name: "seo"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "SEO title override", name: "title", widget: "string", required: false }
          - { label: "Meta description", name: "description", widget: "text", required: false }
          - { label: "Canonical URL", name: "canonicalUrl", widget: "string", required: false }
          - { label: "Social share image override", name: "ogImage", widget: "image", required: false }
          - { label: "Hide from search engines", name: "noindex", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }

  # ── Pages ─────────────────────────────────────────────────
  # Standalone pages (About, Coaching, Let's Chat, ...). Rendered at the
  # site root, e.g. content/pages/about.md -> /about.
  - name: "pages"
    label: "Pages"
    label_singular: "Page"
    folder: "public-site/content/pages"
    create: true
    delete: false
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Updated", name: "updated", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - label: "SEO"
        name: "seo"
        widget: "object"
        required: false
        collapsed: true
        fields:
